parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Port interfaces
    App\User\Domain\Port\PasswordHasherInterface:
        alias: App\User\Infrastructure\Security\SymfonyPasswordHasher

    # Repository interfaces
    App\User\Domain\Repository\UserRepositoryInterface:
        alias: App\User\Infrastructure\Repository\DoctrineUserRepository

    App\Account\Domain\Port\AccountProjectionQuery:
        alias: App\Account\Infrastructure\Projection\DoctrineAccountProjectionQuery

    App\Account\Domain\Port\TransferActivityQuery:
        alias: App\Account\Infrastructure\Query\DoctrineTransferActivityQuery

    App\Account\Domain\Policy\TransferLimitPolicyInterface:
        class: App\Account\Domain\Policy\TransferLimitPolicy
        arguments:
            $activityQuery: '@App\Account\Domain\Port\TransferActivityQuery'
            $dailyLimit: '10000.00'

    App\Account\Domain\Service\MoneyTransferDomainService:
        arguments:
            $transferSpecification: !service
                class: App\Account\Domain\Specification\AndSpecification
                arguments:
                    $left: !service
                        class: App\Account\Domain\Specification\AndSpecification
                        arguments:
                            $left: !service
                                class: App\Account\Domain\Specification\Transfer\NotSameAccountSpecification
                            $right: !service
                                class: App\Account\Domain\Specification\Transfer\CurrencyMatchSpecification
                    $right: !service
                        class: App\Account\Domain\Specification\Transfer\AmountCurrencyMatchSpecification
            $transferLimitPolicy: '@App\Account\Domain\Policy\TransferLimitPolicyInterface'

    App\Notification\Domain\Port\NotificationHistoryQuery:
        alias: App\Notification\Infrastructure\Query\DoctrineNotificationHistoryQuery

    App\Shared\Integration\IntegrationEventMapperInterface:
        alias: App\Shared\Integration\IntegrationEventMapper

    # Event Store
    App\Shared\Infrastructure\EventStore\EventStoreInterface:
        class: App\Shared\Infrastructure\EventStore\DoctrineEventStore
        arguments:
            $connection: '@doctrine.dbal.default_connection'

    # Event-Sourced repositories
    App\Account\Domain\Repository\AccountRepositoryInterface:
        class: App\Account\Infrastructure\Repository\AccountRepository
        arguments:
            $eventStore: '@App\Shared\Infrastructure\EventStore\EventStoreInterface'
            $messageBus: '@messenger.default_bus'
            $connection: '@doctrine.dbal.default_connection'

    App\Transaction\Domain\Repository\TransactionRepositoryInterface:
      alias: App\Transaction\Infrastructure\Repository\DoctrineTransactionRepository

    # OpenAPI JWT decorator
    App\Infrastructure\ApiPlatform\OpenApiJwtDecorator:
        decorates: 'api_platform.openapi.factory'
        arguments:
            $decorated: '@App\Infrastructure\ApiPlatform\OpenApiJwtDecorator.inner'

